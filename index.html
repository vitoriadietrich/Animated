<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login UI</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container">

    <h2>Login</h2>

    <div class="input-box">
        <input type="text" required>
        <label style="margin-top: 10%;">Enter Your Email</label>
    </div>

    <div class="input-box">
        <input type="password" required>
        <label style="margin-top: 10%;">Enter Your Password</label>
    </div>

    <button class="btn">Continue</button>

    <p class="or">or Connect With Social Media</p>

    <button class="social twitter">
        <i class="fab fa-twitter"></i> Sign in With Twitter
    </button>

    <button class="social facebook">
        <i class="fab fa-facebook-f"></i> Sign in With Facebook
    </button>

</div>

</body>
</html>
